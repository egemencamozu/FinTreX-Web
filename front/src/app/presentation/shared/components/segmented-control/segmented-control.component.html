<div class="seg" [class.seg--outline]="variant === 'outline'" data-testid="segmented-control">
  @for (option of options; track option.id) {
    <button
      class="seg__item"
      [class.seg__item--active]="option.id === value"
      type="button"
      (click)="select(option.id)"
    >
      {{ option.label }}
    </button>
  }
</div>
