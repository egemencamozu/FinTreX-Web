<div class="chat-header">
  <div class="chat-header__user-info">
    <div class="chat-header__avatar">
      {{ displayName.charAt(0) || 'U' }}
      @if (isOnline) {
        <div class="chat-header__online-badge"></div>
      }
    </div>
    <div class="chat-header__details">
      <h3 class="chat-header__name">{{ displayName }}</h3>
      <span class="chat-header__status" [class.chat-header__status--online]="isOnline">
        {{ isOnline ? 'Çevrimiçi' : 'Çevrimdışı' }}
      </span>
    </div>
  </div>

  <div class="chat-header__actions">
    <button class="chat-header__btn" (click)="infoClicked.emit()" title="Sohbet Bilgisi">
      <i class="fas fa-info-circle"></i>
    </button>
  </div>
</div>
