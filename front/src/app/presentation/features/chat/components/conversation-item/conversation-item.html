<div class="conversation-item" [class.conversation-item--active]="isActive">
  <div class="conversation-item__avatar">
    <div class="conversation-item__avatar-placeholder">
      {{ displayName.charAt(0) }}
    </div>
    @if (isOnline) {
      <div class="conversation-item__online-badge"></div>
    }
  </div>

  <div class="conversation-item__content">
    <div class="conversation-item__header">
      @if (isEditing()) {
        <input
          class="conversation-item__edit-input"
          [ngModel]="editTitle()"
          (ngModelChange)="editTitle.set($event)"
          (keyup.enter)="saveRename()"
          (keyup.escape)="cancelRename()"
          (click)="$event.stopPropagation()"
          autoFocus
        />
      } @else {
        <h4 class="conversation-item__title">
          {{ displayName }}
        </h4>
      }

      <div class="conversation-item__actions" (click)="$event.stopPropagation()">
        @if (isEditing()) {
          <button class="conversation-item__action-btn" (click)="saveRename()" title="Kaydet">
            <i class="fa-solid fa-check"></i>
          </button>
          <button class="conversation-item__action-btn" (click)="cancelRename()" title="İptal">
            <i class="fa-solid fa-xmark"></i>
          </button>
        } @else {
          <span class="conversation-item__time">
            {{ conversation.lastMessageAtUtc | date: 'HH:mm' }}
          </span>
          <div class="conversation-item__menu">
            <button class="conversation-item__menu-trigger">
              <i class="fa-solid fa-ellipsis-vertical"></i>
            </button>
            <div class="conversation-item__dropdown">
              <button (click)="startEditing($event)">
                <i class="fa-solid fa-pen"></i> Başlığı Düzenle
              </button>
              <button class="danger" (click)="requestDelete($event)">
                <i class="fa-solid fa-trash"></i> Sohbeti Sil
              </button>
            </div>
          </div>
        }
      </div>
    </div>

    <div class="conversation-item__footer">
      <p class="conversation-item__preview">
        {{ lastMessageText }}
      </p>
      @if (conversation.unreadCount > 0) {
        <span class="conversation-item__unread">
          {{ conversation.unreadCount }}
        </span>
      }
    </div>
  </div>
</div>
