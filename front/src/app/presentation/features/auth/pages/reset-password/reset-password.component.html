<div class="reset-password-c">
  <div class="reset-password-c__form-card">
    <div class="reset-password-c__form-header">
      <div class="reset-password-c__form-avatar">
        <i class="fa-solid fa-key"></i>
      </div>
      <h2 class="reset-password-c__form-title">Yeni Sifre Belirle</h2>
      <p class="reset-password-c__form-desc">
        Emailinize gelen linkteki bilgilerle sifrenizi guvenli sekilde yenileyin.
      </p>
    </div>

    @if (errorMessage) {
      <div class="reset-password-c__alert reset-password-c__alert--error">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span>{{ errorMessage }}</span>
      </div>
    }

    @if (successMessage) {
      <div class="reset-password-c__alert reset-password-c__alert--success">
        <i class="fa-solid fa-circle-check"></i>
        <span>{{ successMessage }}</span>
      </div>
    }

    <form class="reset-password-c__form" [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()">
      <input type="hidden" formControlName="email" />
      <input type="hidden" formControlName="token" />

      <div class="reset-password-c__field-grid">
        <div class="reset-password-c__field">
          <label class="reset-password-c__label" for="newPassword">
            <i class="fa-solid fa-lock"></i> Yeni Sifre
          </label>
          <div class="reset-password-c__input-group">
            <span class="reset-password-c__input-icon"><i class="fa-solid fa-key"></i></span>
            <input
              class="reset-password-c__input"
              [class.reset-password-c__input--invalid]="isFieldInvalid('password')"
              id="newPassword"
              type="password"
              formControlName="password"
              placeholder="En az 8 karakter"
              autocomplete="new-password"
            />
          </div>
        </div>

        <div class="reset-password-c__field">
          <label class="reset-password-c__label" for="confirmNewPassword">
            <i class="fa-solid fa-lock"></i> Yeni Sifre Tekrar
          </label>
          <div class="reset-password-c__input-group">
            <span class="reset-password-c__input-icon"><i class="fa-solid fa-key"></i></span>
            <input
              class="reset-password-c__input"
              [class.reset-password-c__input--invalid]="
                isFieldInvalid('confirmPassword') || hasPasswordMismatch()
              "
              id="confirmNewPassword"
              type="password"
              formControlName="confirmPassword"
              placeholder="Tekrar girin"
              autocomplete="new-password"
            />
          </div>
        </div>
      </div>

      @if (hasPasswordMismatch()) {
        <span class="reset-password-c__field-error">
          <i class="fa-solid fa-triangle-exclamation"></i> Sifreler eslesmiyor.
        </span>
      }

      <button
        class="reset-password-c__submit"
        type="submit"
        [disabled]="resetPasswordForm.invalid || isSubmitting"
      >
        @if (isSubmitting) {
          <i class="fa-solid fa-spinner fa-spin"></i> Kaydediliyor...
        } @else {
          <i class="fa-solid fa-floppy-disk"></i> Yeni Sifreyi Kaydet
        }
      </button>
    </form>

    <p class="reset-password-c__switch">
      Giris sayfasina donmek icin
      <a class="reset-password-c__switch-link" routerLink="/auth/login">
        <i class="fa-solid fa-right-to-bracket"></i> Tiklayin
      </a>
    </p>
  </div>
</div>
