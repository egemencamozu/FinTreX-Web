<div class="login-page">
  <!-- Sol Panel — Marka & Slogan -->
  <aside class="login-page__hero">
    <a class="login-page__brand" routerLink="/">
      <span class="login-page__logo">F</span>
      <span class="login-page__brand-name">FinTreX</span>
    </a>

    <div class="login-page__hero-content">
      <h1 class="login-page__title">
        Yatirimlarinizi<br />
        <span class="login-page__title--accent">profesyonellerle</span><br />
        yonetin.
      </h1>
      <p class="login-page__subtitle">
        Portfoy takibi, piyasa analizi ve uzman danismanlik —
        hepsi tek platformda.
      </p>
    </div>

    <div class="login-page__hero-footer">
      <span>BIST</span>
      <span class="login-page__dot"></span>
      <span>Kripto</span>
      <span class="login-page__dot"></span>
      <span>Degerli Madenler</span>
    </div>
  </aside>

  <!-- Sag Panel — Form -->
  <main class="login-page__form-panel">
    <div class="login-page__form-wrapper">
      <h2 class="login-page__form-title">Giris Yap</h2>
      <p class="login-page__form-desc">
        Hesabiniza giris yaparak portfoyunuze erisin.
      </p>

      @if (errorMessage) {
        <p class="login-page__status login-page__status--error">{{ errorMessage }}</p>
      }

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="login-page__field">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="ornek&#64;fintrex.com"
          />
        </div>

        <div class="login-page__field">
          <label for="password">Sifre</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="••••••••"
          />
        </div>

        <div class="login-page__row">
          <label class="login-page__remember">
            <input type="checkbox" formControlName="rememberMe" />
            Beni Hatirla
          </label>
          <button type="button" class="login-page__forgot" (click)="onForgotPasswordClick()">
            Sifremi Unuttum?
          </button>
        </div>

        <button
          class="login-page__submit"
          type="submit"
          [disabled]="loginForm.invalid || isSubmitting"
        >
          {{ isSubmitting ? 'Giris Yapiliyor...' : 'Giris Yap' }}
        </button>
      </form>

      <div class="login-page__divider"><span>veya</span></div>

      <div class="login-page__socials">
        <button type="button" class="login-page__social">
          <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.0 24.0 0 0 0 0 21.56l7.98-6.19z"/>
            <path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Google
        </button>
        <button type="button" class="login-page__social">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M17.05 20.28c-.98.95-2.05.8-3.08.36-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.36C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.32 2.32-2.12 4.52-3.74 4.25z"/>
          </svg>
          Apple
        </button>
      </div>

      <p class="login-page__footer">
        Hesabiniz yok mu?
        <a routerLink="/auth/register">Kayit Ol</a>
      </p>
    </div>
  </main>
</div>
